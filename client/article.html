<!DOCTYPE html> 
<html lang="en"> 
  <head> 
   <meta charset="UTF-8"> 
   <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
   <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
   <meta name="theme-color" content="#000000">
   <title>{{TITLE}} | {{AUTHOR}}</title>
   <meta name="description" content="{{DESCRIPTION}} • {{AUTHOR}}">
   <meta property="og:title" content="{{TITLE}}">
   <meta property="og:description" content="{{DESCRIPTION}} • {{AUTHOR}}">
   <meta property="og:image" content="https://samajiksamiksa.vercel.app/assets/og-img.png">
   <meta property="og:url" content="{{URL}}">
   <meta property="og:type" content="article">
   <meta name="author" content="{{AUTHOR}}">
   <meta property="article:author" content="{{AUTHOR}}">
   <meta name="twitter:card" content="summary_large_image">
   <meta property="twitter:domain" content="samajiksamiksa.vercel.app">
   <meta property="twitter:url" content="{{URL}}">
   <meta name="twitter:title" content="{{TITLE}}">
   <meta name="twitter:description" content="{{DESCRIPTION}} • {{AUTHOR}}">
   <meta name="twitter:image" content="https://samajiksamiksa.vercel.app/assets/og-img.png">   
   <link rel="icon" href="/assets/icon.png" type="image/png">
   <link rel="shortcut icon" href="/assets/icon.png" type="image/png">
   <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
   <link rel="manifest" href="/site.webmanifest">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap"> 
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap">
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Source+Serif+4:wght@400;500;600&family=Fredoka:wght@300..700&family=Rubik+Scribble&family=Rubik+Wet+Paint&family=Slabo+27px&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
   <link rel="stylesheet" href="/article.css">
   <script src="https://kit.fontawesome.com/2e39ca5f52.js" crossorigin="anonymous"></script>
   <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
   <script type="module" src="/article.js"></script>
   <script src="/pwa.js"></script>
  </head>
  <body>
             <!-- navbar -->
   <nav id="my-navbar" class="navbar">
     <div class="logo-box">
       <img id="logo" src="/assets/logo.png" alt="logo">
     </div>
   </nav>

   <div class="menubox">
     <span>Home</span>
     <span>Editor's Note</span>
     <span>Articles</span>
     <span>Papers</span>
     <span>About</span>

   <section class="sec-one">
    <div class="article">
     <h1 id="art-title">{{TITLE}}</h1>
     <h3 id="art-desc">{{DESCRIPTION}}</h3>
     <div class="below-desc-box">
      <div class="author-box">
       <img id="author-img" src="{{AVATAR}}" alt="avatar">
       <span id="author-name">{{AUTHOR}}</span>
      </div>
      <button id="listen-btn">
       <span id="listen-play" class="fa-regular fa-circle-play"></span>
       <span>Listen</span>
      </button>
      <div id="player-box">
       <span id="reset" class="fa-solid fa-rotate-left"></span>
       <span id="minus" class="fa-solid fa-minus"></span>
       <span id="prev" class="fa-solid fa-backward"></span>
       <span id="pause" class="fa-solid fa-pause"></span>
       <span id="next" class="fa-solid fa-forward"></span>
       <span id="plus" class="fa-solid fa-plus"></span>
       <span id="close" class="fa-solid fa-close"></span>    
      </div>
     </div>
     <button id="translate"><span class="fa-solid fa-globe"></span><span>हिन्दी</span><span class="tl-google">Translated by <span>Google</span></span></button>         
     <article id="art-body">{{BODY}}</article>
    </div>
   <section     
  </body>
</html>
